<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
</head>
<body>
    <h2>Contacts</h2>
    <ul>
        {% for contact in contacts %}
            <li> 
                Name: {{ contact.name }} 
                Number: {{ contact.phone }}<br>
                <a href="/delete/{{ loop.index0 }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
    <a href="/add">Add New Contact</a>
</body>
</html>
